<!DOCTYPE html>
<html>
<head>
<title>Billing System</title>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- jQuery UI (Autocomplete) -->
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
}

.container{
background:white;
padding:20px;
width:750px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
padding:8px;
margin:5px;
width:220px;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
margin:5px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

table,th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h2>Billing</h2>

<input type="text" id="productSearch" placeholder="Type product name">
<input type="hidden" id="productIndex">

<input type="number" id="qty" placeholder="Qty">

<button onclick="addItem()">Add</button>

<table>

<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>

<tbody id="billTable"></tbody>

</table>

<div class="total">
Grand Total : ₹ <span id="grandTotal">0</span>
</div>

<button onclick="saveSale()">Complete Sale</button>
<button onclick="generateMonthlyPDF()">Download Monthly Sales PDF</button>

<br><br>

<a href="products.html">Manage Products</a>

</div>

<script>

let products=[];
let grandTotal=0;

/* LOAD PRODUCTS */

function loadProducts(){

products = JSON.parse(localStorage.getItem("products")) || [];

let productList = products.map((p,i)=>({
label: p.name + " - ₹" + p.price,
value: p.name,
index: i
}));

$("#productSearch").autocomplete({

source: productList,

select: function(event, ui){

$("#productSearch").val(ui.item.value);

$("#productIndex").val(ui.item.index);

return false;

}

});

}

loadProducts();

/* ADD ITEM */

function addItem(){

let index=document.getElementById("productIndex").value;
let qty=document.getElementById("qty").value;

if(index=="" || qty==""){

alert("Select product and quantity");
return;

}

let product=products[index];

let total=product.price * qty;

grandTotal += total;

let row=`<tr>
<td>${product.name}</td>
<td>${product.price}</td>
<td>${qty}</td>
<td>${total}</td>
</tr>`;

document.getElementById("billTable").innerHTML += row;

document.getElementById("grandTotal").innerText = grandTotal;

document.getElementById("qty").value="";
document.getElementById("productSearch").value="";
document.getElementById("productIndex").value="";

}

/* SAVE SALE */

function saveSale(){

let sales = JSON.parse(localStorage.getItem("sales")) || [];

let sale = {
date: new Date().toISOString(),
total: grandTotal
};

sales.push(sale);

localStorage.setItem("sales", JSON.stringify(sales));

alert("Sale saved");

}

/* GENERATE MONTHLY PDF */

async function generateMonthlyPDF(){

const { jsPDF } = window.jspdf;

let sales = JSON.parse(localStorage.getItem("sales")) || [];

let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

let monthlySales = sales.filter(s => {

let d = new Date(s.date);

return d.getMonth() === currentMonth &&
       d.getFullYear() === currentYear;

});

let total = 0;

monthlySales.forEach(s => total += Number(s.total));

const doc = new jsPDF();

doc.setFontSize(18);
doc.text("Monthly Sales Report", 20, 20);

doc.setFontSize(12);

let y = 40;

monthlySales.forEach((sale,index)=>{

doc.text(
`Sale ${index+1} - ${new Date(sale.date).toLocaleDateString()} - ₹${sale.total}`,
20,
y
);

y += 10;

});

doc.text("Total Monthly Sales: ₹" + total, 20, y + 10);

doc.save("MonthlySalesReport.pdf");

}

</script>

</body>
</html>
